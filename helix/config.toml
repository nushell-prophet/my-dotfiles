# theme = "tokyonight"
# theme = "carbonfox"
theme = "ayu_evolve"

[editor]
auto-pairs = false
auto-save = true
bufferline = "multiple"
cursorcolumn = true
cursorline = true
insert-final-newline = true
line-number = "relative"
mouse = false
preview-completion-insert = true
shell = ["hx-nu", "--no-newline", "--stdin", "-c"]

[editor.whitespace.render]
nbsp = "all"
newline = "all"
nnbsp = "all"
space = "all"
tab = "all"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
character = "╎" # Some characters that work well: "▏", "┆", "┊", "⸽"
render = true
skip-levels = 1

# keep `enable` first in this section: config-no-wrap.toml is generated by flipping it to false
[editor.soft-wrap]
enable = true
max-indent-retain = 0
max-wrap = 25 # increase value to reduce forced mid-word wrapping

[editor.lsp]
auto-signature-help = false

[keys.normal]
# Use system clipboard
y = ["yank_main_selection_to_clipboard", "yank"]
p = "paste_clipboard_after"
P = "paste_clipboard_before"
d = ["yank_main_selection_to_clipboard", "delete_selection"]
X = ["extend_line_up", "extend_to_line_bounds"]
C-j = ["extend_to_line_bounds", "delete_selection", "paste_after"]
C-k = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
C-right = "move_next_word_start"
C-left = "move_prev_word_end"
tab = "move_parent_node_end"
S-tab = "move_parent_node_start"

# 'C-w' = ":write!"
'C-r' = ":reload"
'C-S-g' = ":pipe-to git add '%{buffer_name}'; git commit -m 'version %{buffer_name}' '%{buffer_name}'; sleep 0.8sec"

[keys.insert]
# j = { j = "normal_mode" }
C-right = "move_next_word_start"
C-left = "move_prev_word_end"
S-tab = "move_parent_node_start"
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"
pageup = "no_op"
pagedown = "no_op"
home = "no_op"
end = "no_op"
# "A-'" = [":append-output '$\"\"'", "collapse_selection"] 

[keys.select]
y = ["yank_main_selection_to_clipboard", "yank"]
p = "paste_clipboard_after"
P = "paste_clipboard_before"
d = ["yank_main_selection_to_clipboard", "delete_selection"]
tab = "extend_parent_node_end"
S-tab = "extend_parent_node_start"

[editor.statusline]
left = ["mode", "spinner", "file-name", "total-line-numbers", "file-encoding"]
center = []
right = ["selections", "primary-selection-length", "position", "position-percentage", "spacer", "diagnostics", "workspace-diagnostics", "version-control"]

# there is one more section with 'keys.select."+"'
[keys.normal."+"]
a = '''
:append-output #append-commented-results→
hx-nu -c r###########'%{selection}'########### o+e>| lines
| each { $"# => ($in)"}
| if r###########'%{selection}'########### ends-with "\n" {} else {prepend ''}
| to text
'''


A = '''
:append-output #append-abreviated-results→
let lines = hx-nu -c r###########'%{selection}'########### o+e>| lines

let len = $lines | length;

$lines
| if $len > 7 {
  first 7 | append $'... and ($len - 7) more lines'
} else {}
| each {$"# => ($in)"}
| if r###########'%{selection}'########### ends-with "\n" {} else {prepend ''}
| to text
'''

# Select a nu expression, press `+ b`: it evaluates the selection and grows the
# result as a RECTANGLE on the line(s) BELOW the command, aligned to the command's
# indent — overwriting only the columns it covers, keeping each line's right side,
# padding past EOF with blank lines (the column-respect Helix's built-in `!` lacks).
# The command stays as a label. Seamless because it's a key sequence, not a prompt:
# write the buffer, run it, reload. hx-block edits the file on disk (same as the `g`
# git key), so the buffer is flushed first and re-read after.
b = [
  ":write",
  ''':pipe-to #block-below-command→
hx-nu -c r###########'%{selection}'###########
| hx-block --below r###########'%{buffer_name}'########### %{selection_line_end}''',
  ":reload",
]

c = '''
:pipe #correct english→
^claude -p r###########'
Correct grammar in the text. Respond only with corrected text.
<text>%{selection}</text>'###########
'''

C = '''
:pipe #remove-commented-output
lines | where $it !~ "^# =>" | to text
'''

e = '''
:pipe dotnu-embeds-update.nu
'''

f = '''
:pipe #flatten-to-nuon
hx-nu -c r###########'%{selection}'########### o+e>| to nuon
'''

g = "@<C-w><C-S-g><C-r>"

n = ":append-output date now | format date %%J-%%Q" # timestamp 

# useful for formatting markdown tables
p = ":pipe pandoc --from markdown --to markdown"

# `s` copies the selection as an <selected-text> tag with a REPO-RELATIVE path
# (from the repo root), `S` (below) with the ABSOLUTE path. The relative path is
# computed in nushell — `%sh{}` runs through hx-nu (nushell), so POSIX `$(...)`
# command substitution does NOT work there; we compute it in the pipeline instead.
# Relative path = <dir relative to repo root> (git show-prefix) + <basename>;
# show-prefix is empty when the file is at the repo root or outside any git repo,
# so it then falls back to just the basename. %{selection} stays in its own raw
# string so its contents need no escaping.
s = [ '''
:pipe-to #xml-coordinate-references→
let bn = r#'%{buffer_name}'#
let pre = (^git -C ($bn | path dirname) rev-parse --show-prefix | complete | get stdout | str trim)
$'<selected-text file="($pre)($bn | path basename)" lines="%{selection_line_start}-%{selection_line_end}">' + r#'%{selection}'# + '</selected-text>' | pbcopy
''', ":write" ]

S = [ '''
:pipe-to #xml-coordinate-references→
r#'<selected-text file="%sh{realpath %{buffer_name}}" lines="%{selection_line_start}-%{selection_line_end}">%{selection}</selected-text>'# | pbcopy
''', ":write" ]

v = '''
:pipe-to #voice
let input = $in
use ~/git/kokoro/kokoro1.nu "kokoro pipe-to-file" 
$input | kokoro pipe-to-file
'''

w = ":set soft-wrap.enable false"
W = ":set soft-wrap.enable true"

