# auto generated config via
# open config.toml -r | str replace "[editor.soft-wrap]\nenable = true" "[editor.soft-wrap]\nenable = false"
# theme = "tokyonight"
# theme = "carbonfox"
theme = "ayu_evolve"

[editor]
auto-pairs = false
auto-save = true
bufferline = "multiple"
cursorcolumn = true
cursorline = true
insert-final-newline = true
line-number = "relative"
mouse = false
preview-completion-insert = true
shell = ["hx-nu", "--no-newline", "--stdin", "-c"]

[editor.whitespace.render]
nbsp = "all"
newline = "all"
nnbsp = "all"
space = "all"
tab = "all"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
character = "╎" # Some characters that work well: "▏", "┆", "┊", "⸽"
render = true
skip-levels = 1

# keep `enable` first in this section: config-no-wrap.toml is generated by flipping it to false
[editor.soft-wrap]
enable = false
max-indent-retain = 0
max-wrap = 25 # increase value to reduce forced mid-word wrapping

[editor.lsp]
auto-signature-help = false

[editor.statusline]
left = ["mode", "spinner", "file-name", "total-line-numbers", "file-encoding"]
center = []
right = ["selections", "primary-selection-length", "position", "position-percentage", "spacer", "diagnostics", "workspace-diagnostics", "version-control"]

[keys.normal]
# Use system clipboard
y = ["yank_main_selection_to_clipboard", "yank"]
p = "paste_clipboard_after"
P = "paste_clipboard_before"
d = ["yank_main_selection_to_clipboard", "delete_selection"]
X = ["extend_line_up", "extend_to_line_bounds"]
C-j = ["extend_to_line_bounds", "delete_selection", "paste_after"]
C-k = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
C-right = "move_next_word_start"
C-left = "move_prev_word_end"
tab = "move_parent_node_end"
S-tab = "move_parent_node_start"

# 'C-w' = ":write!"
'C-r' = ":reload"
# r#'...'# so a path with an apostrophe (don't.md) can't close a quote mid-command
'C-S-g' = ":pipe-to git add r#'%{buffer_name}'#; git commit -m r#'version %{buffer_name}'# r#'%{buffer_name}'#; sleep 0.8sec"

[keys.insert]
# j = { j = "normal_mode" }
C-right = "move_next_word_start"
C-left = "move_prev_word_end"
S-tab = "move_parent_node_start"
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"
pageup = "no_op"
pagedown = "no_op"
home = "no_op"
end = "no_op"
# "A-'" = [":append-output '$\"\"'", "collapse_selection"]

[keys.select]
y = ["yank_main_selection_to_clipboard", "yank"]
p = "paste_clipboard_after"
P = "paste_clipboard_before"
d = ["yank_main_selection_to_clipboard", "delete_selection"]
tab = "extend_parent_node_end"
S-tab = "extend_parent_node_start"

[keys.normal."+"]
# Helper bodies live in nu-hx.nu (hx-nu loads it for every shell call). Bindings use
# the :pipe family because only it sends the selection on stdin — that's also why a/A
# moved off :append-output. Stdin replaces the old r###########'%{selection}'###########
# substitution, which broke on unlucky selection content (e.g. a stray '#).
a = ":pipe nu-hx annotate" # append results as `# =>` comments after the selection
A = ":pipe nu-hx annotate --abbreviate" # same, capped at 7 lines

# Select a nu expression, press `+ b`: it evaluates the selection and grows the
# result as a RECTANGLE on the line(s) BELOW the command, aligned to the command's
# indent (the column-respect Helix's built-in `!` lacks). The command stays as a
# label. Seamless because it's a key sequence, not a prompt: hx-block edits the file
# on disk (same as the `g` git key), so the buffer is flushed first and re-read after.
b = [
  ":write",
  ":pipe-to nu-hx block-below r#'%{buffer_name}'# %{selection_line_end}",
  ":reload",
]

# the selection comes from stdin ($in), so prose with `'#` (markdown headers etc.)
# can't terminate the prompt string — the reason the long-# fence existed here
c = '''
:pipe #correct english→
^claude -p $"Correct grammar in the text. Respond only with corrected text.\n<text>($in)</text>"
'''

C = ":pipe nu-hx clear-annotations" # remove `# =>` result comments

e = '''
:pipe dotnu-embeds-update.nu
'''

f = ":pipe nu-hx flatten" # flatten-to-nuon

g = "@<C-w><C-S-g><C-r>"

n = ":append-output date now | format date %%J-%%Q" # timestamp

# useful for formatting markdown tables
p = ":pipe pandoc --from markdown --to markdown"

# `s` copies the selection as an <selected-text> tag with a REPO-RELATIVE path,
# `S` with the ABSOLUTE path. Path is computed in nushell (inside nu-hx copy-tag)
# because `%sh{}` runs through hx-nu (nushell), where POSIX `$(...)` does not work.
s = [ ":pipe-to nu-hx copy-tag r#'%{buffer_name}'# %{selection_line_start} %{selection_line_end}", ":write" ]

S = [ ":pipe-to nu-hx copy-tag --absolute r#'%{buffer_name}'# %{selection_line_start} %{selection_line_end}", ":write" ]

v = '''
:pipe-to #voice
let input = $in
use ~/git/kokoro/kokoro1.nu "kokoro pipe-to-file" 
$input | kokoro pipe-to-file
'''

w = ":set soft-wrap.enable false"
W = ":set soft-wrap.enable true"

